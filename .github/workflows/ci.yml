name: ci
on: [push, pull_request]
jobs:
  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e .[dev]
      - if: runner.os == 'Linux'
        run: clang --version
      - if: runner.os == 'Windows'
        run: choco install llvm --no-progress -y
      - run: pytest -q tests/test_pkg.py tests/test_module_resolver.py tests/test_astpm.py

  test-linux-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e .[dev]
      - run: clang --version
      - run: pytest -q --cov=astra --cov-report=term-missing --junitxml=pytest-results.xml
      - run: pytest -q tests/test_property_fuzz.py
      - run: mutmut run --max-children 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: pytest-results.xml
